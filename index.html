<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUToolbox 2026 — EU Business & Legal Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e; --bg2: #0f1629; --bg3: #151d35; --card: #111827;
    --border: rgba(99,120,255,0.15); --border2: rgba(99,120,255,0.25);
    --accent: #4f6ef7; --accent2: #7c3aed; --accent3: #06b6d4;
    --green: #10b981; --text: #f0f4ff; --text2: #8892b0; --text3: #4a5568;
    --mono: 'JetBrains Mono', monospace; --sans: 'Sora', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  
  /* [Original Animations & Background Orbs] */
  .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(79,110,247,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(79,110,247,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .bg-orb1 { position: fixed; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(79,110,247,0.12) 0%, transparent 70%); top: -200px; left: -200px; z-index: 0; animation: orbFloat 8s infinite; }
  @keyframes orbFloat { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(30px, 20px); } }

  /* NAVIGATION & LAYOUT */
  nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; background: rgba(10,15,30,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
  .logo { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .nav-tools { display: flex; gap: 8px; }
  .nav-tool { font-size: 12px; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); color: var(--text2); cursor: pointer; background: transparent; transition: 0.3s; }
  .nav-tool.active { border-color: var(--accent); color: var(--accent); background: rgba(79,110,247,0.08); }

  /* TOOL SWITCHING SYSTEM */
  .tool-section { display: none; animation: fadeInUp 0.6s ease; }
  .tool-section.active { display: block; }

  /* REUSABLE CLASSES FROM YOUR CODE */
  .main { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }
  .tool-wrapper { background: var(--card); border: 1px solid var(--border2); border-radius: 24px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.4); margin-top: 40px; }
  .tool-header { padding: 28px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: linear-gradient(135deg, rgba(79,110,247,0.06), rgba(6,182,212,0.03)); }
  .tool-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .tool-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; }
  .tool-body { padding: 32px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
  label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; }
  input, select, textarea { width: 100%; background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); padding: 14px; outline: none; transition: 0.2s; }
  input:focus { border-color: var(--accent); }
  .calc-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
  .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,110,247,0.4); }
  
  /* PREVIEW BLOCK FOR GENERATORS */
  .preview-area { background: #fff; color: #1a1a1a; padding: 40px; border-radius: 8px; font-family: 'Inter', sans-serif; margin-top: 30px; display: none; line-height: 1.5; font-size: 14px; }
  .policy-text { background: var(--bg2); padding: 20px; border-radius: 12px; border: 1px solid var(--border); font-family: var(--mono); font-size: 13px; color: var(--text2); max-height: 400px; overflow-y: auto; display: none; margin-top: 20px; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  
  /* Modes Toggle styling */
  .toggle-group { display: flex; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 20px; }
  .toggle-btn { flex: 1; padding: 10px; border: none; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); background: transparent; }
  .toggle-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb1"></div>
<div class="toast" id="toast">✓ Copied to clipboard!</div>

<nav>
  <div class="logo">EU<span>toolbox</span></div>
  <div class="nav-tools">
    <button class="nav-tool active" onclick="switchTool('vat-calc')">VAT Calculator</button>
    <button class="nav-tool" onclick="switchTool('invoice-gen')">Invoice/Payslip</button>
    <button class="nav-tool" onclick="switchTool('gdpr-gen')">GDPR Generator</button>
  </div>
  <div class="nav-badge">🇪🇺 2026 Updated</div>
</nav>

<main class="main">

  <section id="vat-calc" class="tool-section active">
    <div class="tool-wrapper">
      <div class="tool-header">
        <div class="tool-title"><div class="tool-icon">🧮</div> VAT Calculator</div>
        <div class="updated-badge" style="color:var(--green); font-size:11px; font-family:var(--mono);">✓ Jan 2026 Rates</div>
      </div>
      <div class="tool-body">
        <div class="toggle-group">
            <button class="toggle-btn active" id="btn-add" onclick="setMode('add')">Add VAT</button>
            <button class="toggle-btn" id="btn-remove" onclick="setMode('remove')">Remove VAT</button>
        </div>
        <div class="form-grid">
            <div class="field">
                <label>Country</label>
                <select id="country" onchange="updateVatRate()">
                    <option value="DE|19|€|Germany">🇩🇪 Germany — 19%</option>
                    <option value="FR|20|€|France">🇫🇷 France — 20%</option>
                    <option value="NL|21|€|Netherlands">🇳🇱 Netherlands — 21%</option>
                </select>
            </div>
            <div class="field">
                <label>Rate (%)</label>
                <input type="number" id="vatRate" value="19">
            </div>
        </div>
        <div class="field">
            <label>Amount</label>
            <input type="number" id="price" placeholder="0.00">
        </div>
        <button class="calc-btn" onclick="calculateVAT()">Calculate →</button>
        
        <div id="results" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="color:var(--text2)">Total Amount:</span>
                <span id="res-total" style="font-family:var(--mono); color:var(--accent); font-weight:700; font-size:20px;">—</span>
            </div>
            <button class="nav-tool" style="width:100%; border-color:var(--green); color:var(--green);" onclick="copyResults()">Copy Results</button>
        </div>
      </div>
    </div>
  </section>

  <section id="invoice-gen" class="tool-section">
    <div class="tool-wrapper">
      <div class="tool-header">
        <div class="tool-title"><div class="tool-icon">📄</div> Invoice & Payslip Gen</div>
        <div class="updated-badge" style="color:var(--accent3); font-size:11px; font-family:var(--mono);">PDF Export Ready</div>
      </div>
      <div class="tool-body">
        <div class="toggle-group">
            <button class="toggle-btn active" id="mode-inv" onclick="setGenMode('invoice')">Tax Invoice</button>
            <button class="toggle-btn" id="mode-pay" onclick="setGenMode('payslip')">Employee Payslip</button>
        </div>
        <div class="form-grid">
            <div class="field"><label>Your Business Name</label><input type="text" id="biz-name" placeholder="Oxen Hide Ltd"></div>
            <div class="field"><label>Client/Employee Name</label><input type="text" id="client-name" placeholder="John Doe"></div>
        </div>
        <div class="form-grid">
            <div class="field"><label>Item/Position</label><input type="text" id="inv-item" placeholder="Web Development"></div>
            <div class="field"><label>Amount (€)</label><input type="number" id="inv-amount" placeholder="0.00"></div>
        </div>
        <button class="calc-btn" onclick="generateDocument()">Generate Preview →</button>

        <div id="invoice-preview" class="preview-area">
            </div>
      </div>
    </div>
  </section>

  <section id="gdpr-gen" class="tool-section">
    <div class="tool-wrapper">
      <div class="tool-header">
        <div class="tool-title"><div class="tool-icon">🛡️</div> GDPR Privacy Generator</div>
        <div class="updated-badge" style="color:var(--accent2); font-size:11px; font-family:var(--mono);">EU Compliance 2026</div>
      </div>
      <div class="tool-body">
        <div class="field"><label>Website URL</label><input type="text" id="gdpr-url" placeholder="www.example.com"></div>
        <div class="form-grid">
            <div class="field"><label>Company Name</label><input type="text" id="gdpr-company" placeholder="Example GmbH"></div>
            <div class="field"><label>Contact Email</label><input type="email" id="gdpr-email" placeholder="privacy@example.com"></div>
        </div>
        <div class="field">
            <label>Data Collected</label>
            <select id="gdpr-data" multiple style="height:100px; padding:10px;">
                <option value="Email address">Email address</option>
                <option value="First name and last name">Full Name</option>
                <option value="Cookies and Usage Data">Cookies & Tracking</option>
                <option value="Billing Details">Billing Info</option>
            </select>
        </div>
        <button class="calc-btn" style="background:var(--accent2);" onclick="generateGDPR()">Generate Policy Text →</button>

        <div id="gdpr-result" class="policy-text">
            </div>
      </div>
    </div>
  </section>

</main>

<footer>
    <p>© 2026 EUToolbox.com — Free EU Business Tools</p>
</footer>

<script>
// --- NAVIGATION LOGIC ---
function switchTool(sectionId) {
    document.querySelectorAll('.tool-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tool').forEach(b => b.classList.remove('active'));
    
    document.getElementById(sectionId).classList.add('active');
    event.currentTarget.classList.add('active');
}

// --- 1. VAT LOGIC (Aapka Existing System) ---
let vatMode = 'add';
function setMode(m) {
    vatMode = m;
    document.getElementById('btn-add').classList.toggle('active', m==='add');
    document.getElementById('btn-remove').classList.toggle('active', m==='remove');
}
function updateVatRate() {
    const val = document.getElementById('country').value.split('|');
    document.getElementById('vatRate').value = val[1];
}
function calculateVAT() {
    const price = parseFloat(document.getElementById('price').value);
    const rate = parseFloat(document.getElementById('vatRate').value);
    const resDiv = document.getElementById('results');
    const resTotal = document.getElementById('res-total');
    
    if(!price) return;
    let total = (vatMode === 'add') ? price * (1 + rate/100) : price / (1 + rate/100);
    
    resTotal.innerText = '€' + total.toFixed(2);
    resDiv.style.display = 'block';
}

// --- 2. INVOICE/PAYSLIP LOGIC ---
let genMode = 'invoice';
function setGenMode(m) {
    genMode = m;
    document.getElementById('mode-inv').classList.toggle('active', m==='invoice');
    document.getElementById('mode-pay').classList.toggle('active', m==='payslip');
}
function generateDocument() {
    const biz = document.getElementById('biz-name').value || 'My Business';
    const client = document.getElementById('client-name').value || 'Valued Client';
    const amount = document.getElementById('inv-amount').value || '0.00';
    const item = document.getElementById('inv-item').value || 'Service';
    const preview = document.getElementById('invoice-preview');

    const date = new Date().toLocaleDateString();
    
    preview.innerHTML = `
        <div style="border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 20px;">
            <h2 style="text-transform:uppercase;">${genMode === 'invoice' ? 'Tax Invoice' : 'Salary Payslip'}</h2>
            <p>Date: ${date} | Ref: #2026-001</p>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:40px;">
            <div><strong>From:</strong><br>${biz}</div>
            <div><strong>To:</strong><br>${client}</div>
        </div>
        <table style="width:100%; border-collapse:collapse;">
            <tr style="background:#f4f4f4;">
                <th style="padding:10px; text-align:left;">Description</th>
                <th style="padding:10px; text-align:right;">Total</th>
            </tr>
            <tr>
                <td style="padding:15px; border-bottom:1px solid #eee;">${item}</td>
                <td style="padding:15px; border-bottom:1px solid #eee; text-align:right;">€${parseFloat(amount).toFixed(2)}</td>
            </tr>
            <tr>
                <td style="padding:15px; text-align:right;"><strong>Grand Total:</strong></td>
                <td style="padding:15px; text-align:right; font-size:18px;"><strong>€${parseFloat(amount).toFixed(2)}</strong></td>
            </tr>
        </table>
        <p style="margin-top:40px; font-size:10px; color:#666; text-align:center;">Generated via EUToolbox.com - Digital Compliance Suite</p>
    `;
    preview.style.display = 'block';
    preview.scrollIntoView({ behavior: 'smooth' });
}

// --- 3. GDPR LOGIC ---
function generateGDPR() {
    const url = document.getElementById('gdpr-url').value || 'yourwebsite.com';
    const comp = document.getElementById('gdpr-company').value || 'Your Company';
    const email = document.getElementById('gdpr-email').value || 'contact@example.com';
    const dataOptions = Array.from(document.getElementById('gdpr-data').selectedOptions).map(o => o.value);
    
    const resultDiv = document.getElementById('gdpr-result');
    const text = `PRIVACY POLICY\nLast Updated: May 2026\n\nAt ${comp}, we are committed to protecting your personal data in compliance with EU GDPR 2026 regulations. 

1. DATA COLLECTION: We collect ${dataOptions.join(', ')} to provide and maintain our service at ${url}.

2. LEGAL BASIS: We process data based on your consent and for the performance of contracts.

3. YOUR RIGHTS: Under GDPR, you have the right to access, rectify, or erase your personal data. 

4. CONTACT: For any data-related queries, please contact our Data Protection Officer at: ${email}.

This policy was generated for ${url}. All rights reserved.`;

    resultDiv.innerText = text;
    resultDiv.style.display = 'block';
}

// --- UTILS ---
function copyResults() {
    const val = document.getElementById('res-total').innerText;
    navigator.clipboard.writeText(val);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>

</body>
</html>
